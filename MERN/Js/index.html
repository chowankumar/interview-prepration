<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <p id="parent">
        Lorem ipsum dolor sit amet <strong id="child">helllo child</strong> consectetur adipisicing elit. Omnis, voluptas ratione. Optio cumque sit, debitis laborum quam minima corporis asperiores!
    </p>
    

    <script>
        let parent = document.getElementById("parent");
        let child = document.getElementById("child");

        parent.addEventListener('click',()=>{
            console.log("parent")
        })
        child.addEventListener('click',()=>{
            console.log("child")
        })
    </script>
</body>
</html>
